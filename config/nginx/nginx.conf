# =============================================================================
# Nginx — Reverse Proxy for BanusNas
# =============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Open file caching for static assets — reduces syscalls on NAS storage
    open_file_cache max=1000 inactive=60s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Proxy buffering — reduces upstream connections for small API responses
    proxy_buffer_size 16k;
    proxy_buffers 4 32k;
    proxy_busy_buffers_size 64k;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml application/wasm;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Conditional WebSocket upgrade
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=30r/m;

    # Upstream definitions
    upstream banusnas_api {
        server banusnas-api:8000;
        keepalive 8;  # Reuse connections to the FastAPI backend
    }

    upstream go2rtc_api {
        server banusnas-frigate:1984;
        keepalive 4;
    }

    server {
        listen 80;
        server_name _;

        # ---------------------------------------------------------------
        # PWA Static Files (React build output)
        # ---------------------------------------------------------------
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ @indexhtml;

            # Cache hashed static assets (immutable)
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }

            # Service worker + PWA files must not be cached
            location = /sw.js {
                expires off;
                add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            }

            location = /registerSW.js {
                expires off;
                add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            }

            location = /manifest.webmanifest {
                expires off;
                add_header Cache-Control "no-cache";
            }

            location = /manifest.json {
                expires off;
                add_header Cache-Control "no-cache";
            }

            # index.html should never be cached
            location = /index.html {
                expires off;
                add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            }
        }

        # SPA fallback — when try_files reaches @indexhtml the request URI is
        # the original path (e.g. /cameras), so the `location = /index.html`
        # exact match above does NOT apply. Without this block the served
        # index.html inherits the default (no Cache-Control), which causes
        # browsers to keep using a stale shell — and a stale shell means the
        # service worker's `update()` checks see no change and the user has
        # to manually clear cache to pick up a deploy.
        location @indexhtml {
            expires off;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            try_files /index.html =404;
        }

        # ---------------------------------------------------------------
        # API — FastAPI Backend
        # ---------------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://banusnas_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Auth endpoints have stricter rate limiting
        location /api/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_pass http://banusnas_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---------------------------------------------------------------
        # WebSocket — Real-time Events
        # ---------------------------------------------------------------
        location /ws/ {
            proxy_pass http://banusnas_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;
        }

        # ---------------------------------------------------------------
        # go2rtc — WebRTC/HLS/RTSP Streams (proxied, low-latency)
        # ---------------------------------------------------------------
        location /go2rtc/ {
            proxy_pass http://go2rtc_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            # Disable all proxy buffering for real-time streaming
            proxy_buffering off;
            proxy_cache off;

            # Conditional WebSocket support (only upgrade when client requests it)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ---------------------------------------------------------------
        # Frigate API — proxy for snapshots, recordings, events
        # ---------------------------------------------------------------
        location /frigate/ {
            proxy_pass http://banusnas-frigate:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_buffering off;
        }

        # ---------------------------------------------------------------
        # Recording segments — served with caching for fast playback
        # ---------------------------------------------------------------
        location /api/recordings/ {
            proxy_pass http://banusnas_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;

            # Pass through immutable cache headers from FastAPI
            proxy_hide_header Cache-Control;
            add_header Cache-Control $upstream_http_cache_control;
        }
    }
}
